<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Booking - Hotel Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar w-64 flex flex-col hidden md:flex">
            <div class="p-4 border-b border-gray-800">
                <h1 class="text-lg font-semibold text-white tracking-wide">PMS Enterprise</h1>
            </div>
            <nav class="flex-1 py-4">
                <a href="dashboard.html" class="nav-item">Dashboard</a>
                <a href="rooms.html" class="nav-item">Rooms</a>
                <a href="booking.html" class="nav-item active">Bookings</a>
                <a href="checkout.html" class="nav-item">Checkout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar h-16 flex items-center px-6 border-b border-gray-200">
                <h2 class="text-xl font-semibold text-gray-800">Create Reservation</h2>
            </header>

            <div class="content-area">
                <div class="max-w-4xl mx-auto">
                    <form id="booking-form" class="panel p-8">
                        <h3 class="text-lg font-semibold text-gray-800 mb-6 pb-2 border-b border-gray-100">Guest Information</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <div class="form-group mb-0">
                                <label class="form-label">First Name</label>
                                <input type="text" id="first-name" class="form-input" placeholder="John" required>
                            </div>
                            <div class="form-group mb-0">
                                <label class="form-label">Last Name</label>
                                <input type="text" id="last-name" class="form-input" placeholder="Doe" required>
                            </div>
                            <div class="form-group mb-0">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-input" placeholder="john.doe@example.com">
                            </div>
                            <div class="form-group mb-0">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-input" placeholder="+1 (555) 000-0000">
                            </div>
                        </div>

                        <h3 class="text-lg font-semibold text-gray-800 mb-6 pb-2 border-b border-gray-100">Reservation Details</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div class="form-group mb-0">
                                <label class="form-label">Check-in Date</label>
                                <input type="date" id="check-in" class="form-input" required>
                            </div>
                            <div class="form-group mb-0">
                                <label class="form-label">Check-out Date</label>
                                <input type="date" id="check-out" class="form-input" required>
                            </div>
                            <div class="form-group mb-0">
                                <label class="form-label">Guests (Adults/Kids)</label>
                                <div class="flex gap-2">
                                    <input type="number" class="form-input w-full" placeholder="Adults" min="1" value="1">
                                    <input type="number" class="form-input w-full" placeholder="Children" min="0" value="0">
                                </div>
                            </div>
                            <div class="form-group mb-0 md:col-span-3">
                                <label class="form-label">Room Allocation</label>
                                <select id="room-select" class="form-input" required>
                                    <option value="">Select a Room...</option>
                                    <option value="101">Room 101 - Standard ($120/night)</option>
                                    <option value="102">Room 102 - Deluxe ($200/night)</option>
                                </select>
                            </div>
                        </div>

                        <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
                            <button type="button" class="px-4 py-2 bg-white border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 focus:outline-none">Cancel</button>
                            <button type="submit" id="submit-booking-btn" class="btn-primary">Confirm Booking</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/ui.js"></script>
</body>
</html>
