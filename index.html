<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management System - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="panel p-8 max-w-sm w-full">
        <div class="text-center mb-6">
            <h1 class="text-xl font-semibold text-gray-900">Sign in to your account</h1>
            <p class="text-sm text-gray-500 mt-1">Enterprise Hotel Management</p>
        </div>

        <form action="dashboard.html" method="GET">
            <div class="form-group">
                <label for="email" class="form-label">Email address</label>
                <input type="email" id="email" class="form-input" required placeholder="admin@hotel.com">
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-input" required placeholder="••••••••">
            </div>
            
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center">
                    <input id="remember-me" type="checkbox" class="h-4 w-4 text-sky-600 border-gray-300 rounded focus:ring-sky-500">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-900">Remember me</label>
                </div>
                <div class="text-sm">
                    <a href="#" class="font-medium text-sky-600 hover:text-sky-500">Forgot password?</a>
                </div>
            </div>

            <button type="submit" class="btn-primary w-full">Sign in</button>
        </form>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/ui.js"></script>
</body>
</html>
